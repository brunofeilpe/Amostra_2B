<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="index.css">
    <script src="main.js" defer></script>
</head>
<body>
    <main class="app-shell">
        <section class="calculator-card">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Calculadora</p>
                    <h1>Modo celular</h1>
                </div>
                <a href="second.html" class="secondary-link">Fórmulas</a>
            </header>

            <section class="display-panel" aria-label="Visor da calculadora">
                <input type="text" id="display" readonly aria-label="Expressão">
            </section>

            <section class="keypad" aria-label="Teclado da calculadora">
                <button type="button" class="key function" onclick="clearDisplay()">AC</button>
                <button type="button" class="key function" onclick="appendToDisplay('(')">(</button>
                <button type="button" class="key function" onclick="appendToDisplay(')')">)</button>
                <button type="button" class="key operator" onclick="appendToDisplay('/')">÷</button>

                <button type="button" class="key" onclick="appendToDisplay('7')">7</button>
                <button type="button" class="key" onclick="appendToDisplay('8')">8</button>
                <button type="button" class="key" onclick="appendToDisplay('9')">9</button>
                <button type="button" class="key operator" onclick="appendToDisplay('*')">×</button>

                <button type="button" class="key" onclick="appendToDisplay('4')">4</button>
                <button type="button" class="key" onclick="appendToDisplay('5')">5</button>
                <button type="button" class="key" onclick="appendToDisplay('6')">6</button>
                <button type="button" class="key operator" onclick="appendToDisplay('-')">−</button>

                <button type="button" class="key" onclick="appendToDisplay('1')">1</button>
                <button type="button" class="key" onclick="appendToDisplay('2')">2</button>
                <button type="button" class="key" onclick="appendToDisplay('3')">3</button>
                <button type="button" class="key operator" onclick="appendToDisplay('+')">+</button>

                <button type="button" class="key wide" onclick="appendToDisplay('0')">0</button>
                <button type="button" class="key" onclick="appendToDisplay('.')">.</button>
                <button type="button" class="key operator" onclick="appendToDisplay('^')">^</button>
                <button type="button" class="key equals" onclick="calcular()">=</button>

                <button type="button" class="key function wide" onclick="appendToDisplay('%')">%</button>
                <button type="button" class="key function" onclick="appendToDisplay('√(')">√</button>
                <button type="button" class="key function wide" onclick="clearDisplay()">Limpar tudo</button>
            </section>
        </section>
    </main>
</body>
</html>
